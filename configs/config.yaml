feeder: dataloader.feeder_mp.BaseFeeder
phase: train
dataset: phoenix14-T
num_epoch: 50
work_dir: ./work_dir/Phase1_Resnet_mp/
load_checkpoints: ./work_dir/Phase1_Resnet_mp/_best_model.pt
#load_weights: ./work_dir/Phase1_Resnet/_best_model.pt
batch_size: 1
test_batch_size: 1
num_worker: 8
pin_memory: True
device: 0
log_interval: 100
save_interval: 5

loss_weights:
  SeqCTC: 1.0
  IteLoss: 1.0
  ItaLoss: 10.0

optimizer_args:
  optimizer: AdamW
  base_lr: 0.0001
  step: [25,45]
  learning_ratio: 1
  weight_decay: 0.005
  #weight_decay: 0.0001
  weight_ratio: 1000
  start_epoch: 0
  nesterov: False

feeder_args:
  mode: 'train'
  num_gloss: -1

model: utils.rec_net_mp.SLRModel
decode_mode: beam
model_args: {}
  #vit_type: ViT-B/32
